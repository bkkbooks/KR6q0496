body:
  text: 嗣法門人最正等編住湖廣安陸府西來禪寺語録順治丁酉歲六月二十九日師受衆護法紳襟檀越居士暨諸山耆舊本寺監院請住西來禪寺於十月十五日進院即日衆護法請開堂師至座前拈啓示衆云文采全彰廓落煥然迥沒摸索現前一衆英靈共有常光顯露大衆還委悉麼如或未會仰煩維那宣過宣畢指法座云坐斷路頭魔狐潛蹤達磨不識威王沉吟大衆還識路頭麼試看新長老放一線道遂升拈香云者瓣香根盤空劫葉覆今時信手拈來爇向寶爐端為祝延今上皇帝聖躬萬歲萬歲萬萬歲恭願道愈三皇仁風齊北極稱尊德冠五帝睿算等南山永固次拈云者瓣香布則金聲玉振合則條理始終奉為滿朝文武闔國公卿天下列位尊官伏願祿位高登永佐君王施仁政法幢弘護長勷列祖振宗風復拈云者瓣香顯示當陽直截現成奉為護法紳襟居士列剎高賢本山耆德伏願豁開頂門正眼洞徹一貫圜機又拈云者瓣香深藏大機廓顯大用今對人天衆前拈出爇向爐中專伸供養現住襄陽府百丈山黃龍堂上傳臨濟正宗第三十三世本師奇然智大和尚用酬法乳攝衣就座上首白椎云法筵龍象衆當觀第一義師云當觀第一義露刃霜鋒利掣電羅影蹤萬里更萬里還有獨露者麼僧問四相皆空三心未有是箇甚麼師云頭頭獨露進云意旨如何師云處處全彰進云恁麼學人禮拜和尚去也師云好與三十拄杖問和尚未登寶華王座甘露已潤群生時如何師云開豁人天眼渾忘舊面皮進云謂是山靈有待謂是法爾如然師云顯大機大用進云恁麼西來法道從今振枯木重開劫外華師云瞻之仰之驀拈拄杖云神光一道烜赫十方妙體無形炳然萬象寒風颯颯清機歷歷霜華巧呈堂堂覿面所以道用時便用心無定動隨處作主遇緣即宗無倚無依自繇自在祇如今日開堂祝聖一句作麼生道皇風蕩蕩被寰宇兆姓歌歡逾萬春復舉古德道夫為善知識須是驅耕夫牛奪饑人食驅耕夫牛令苗稼滋盛奪饑人食令永絶饑虛大衆古德竊得些子活計氣宇如王擒縱自由這樣說話諸方舉者甚多聞者如風過耳殊不知古德一期方便與伊摧魔破執既驅其牛奪其食為甚麼卻苗稼滋盛永絶饑虛喝一喝云驅其牛耶奪其食耶還有緇素得出底麼試出來呈醜拙看如無禍不單行福不重受上首復結椎云諦觀法王法法王法如是卓拄杖下座謝辭不録立職事上堂衆兄弟既到者裏挂搭都是三條椽下客宜從履踐自了心休二六時中事在精勤行存潔白忘憎愛絶是非隻腳立定冰凌上度九曲劍刃上拾全身恁麼謂之極則呵呵正是錯認驢鞍橋作阿爺下頷且從容莫疑猜西來與現前兄弟行也如是坐也如是箇箇衣下本來現成搬柴運水執爨負舂烹茶挈瓶拋籌拈杓營繕屋廬事持齊饌採擇菜果支收出內糊窗拭器掃地裝香街坊打化賓客送迎主伴交參乃佛祖始終正行自成一家規繩事事圜融塵塵方便叢林隨事立名因名顯分輕重得所優劣無差規矩以之而立法幢因茲而興山僧只管牽枝引蔓萬種施為拿空塞空以毒攻毒秖如展佛祖現成家風布叢林斬新條令又作麼生髑髏前暗行賞罰電光裏明驗主賓喝一喝下座次日結制請上堂西來結制雲水濟集把住咽喉甚處出氣非是山僧壓良只為諸人不薦汝諸人薦麼若薦得各各清淨寶爐不假莖柴塊炭晝夜熾然無回避處無間隔處所以諸佛證知空明廓徹得大自在興大作用故云如我按指海印發光衆生昧之逐妄受生業識忙忙無本可據所以世尊道汝暫舉心塵勞先起現前緇素貴賤男女自肯回光悟同本得有本得底麼出來道看僧問和尚今日結制十方衲子聚會以衆為心心不可得和尚還有箇甚麼師云打草正要驚蛇進云莫塗糊人好師云你刺腦入膠盆作麼便打問年年月月十五日和尚因甚又認著十月十五日師打云伊看是十五日不是十五日聻僧禮拜師云儱侗不少復云秋末冬初九旬茲始事不獲已放一線道拈拄杖云會麼若也未會山僧更為諸人顯露去也拽拄杖下座安陸戎府大誕請上堂通達本法心無法無非法悟了同未悟無心亦無法古德恁麼道既是無心又無法卻喚甚麼作本法本法又作麼生通達諸人大須細意者箇常露現前自由自在未曾有一法解蓋得伊未曾有一法解等得伊轉轆轆底蓋色蓋聲周流無滯不與萬法為鄰一切法蓋伊不得所以古德云目前無法意在目前不是目前法非耳目之所到諸人委悉也無若未委悉不免為諸人注破心不妄取過去法斯名為智不貪未來事斯名為慧不於現在有所住斯名為定如是了達三世悉空寂此智此慧此定一一無邊際所以當陽一著非異非如非見非說非無非有非佛非法昭同杲日廣若太虛昔日黃面老子於此示生修行於此悟道成佛全不由他悉承渠力即如今千聖頂𩕳上掫出了也遂舉拂子云還見麼若是大人具大見大智得大用舉一明三底瞞他一點不得何故當人日用現成今日山僧以此廣大無邊際心說此廣大無邊際法奉為安陸戎府筠菴劉大護法高登祿位慧性宏開享富貴多子孫永作皇家柱石恆為佛法金湯祇如即今依時及節一句作麼生道麗景重重彰瑞氣壽山高到大椿年下座佛誕黃奎芳陳尚德二善士率合鎮檀越請上堂眹兆才彰成露布呱聲未絶便橫行指天指地提持處只要人人正眼明赤骨師兒開巨口通身現出大人形是則固是今日人天俱集為佛慶誕一句作麼生道今朝處處澆香水東土西天共讚誠戎府劉護法僧請上堂考鐘伐鼓獨震宏音滿堂龍象廓開胸襟親遭香積妙供灼然六味徹心不曾咬著粒米箇箇飽足歡欣然雖如是諸人還聞毛孔香麼若聞廣慧心酬大信施興祚國祝聖皇猷復頌云毗耶城裏老維摩不二門頭鮮客過一箇無言寧有礙頂𩕳醯眼耀山河下座伽藍殿上梁慈雲化主請上堂良辰高豎伽藍堂輸我禪林道播揚衲子豁開正法眼自然瀟灑絶諸望檀那家業永興盛施主門闌恆吉祥福慧莊嚴二種備獅床千古振宗綱巨梁跨地衝霄碧宛似蛟龍奮翼翔佳致斯山文兆出相傳猶演濟燈長喝一喝宜城縣萬壽寺瑞林寂空見明禪德請上堂山僧二十餘年行腳今日偶開鋪面蓋為衆竭力大有不著便汝諸人平地討喫交過歸阿誰然雖如是事無一向驀拈拄杖卓一下云兔角杖龜毛拂通身無影覿體離詮道人安用今古昭然那有三玄三要也無五位君臣顧視左右云總來滯貨不出門上堂箇箇英靈猛烈漢本來面目沒覆藏盡大地人無兩樣何雖好肉上剜瘡復舉六祖大師云汝等諸人自心是佛更莫狐疑外無一法而能建立皆是本心生萬種法故經云心生種種法生心滅種種法滅若欲成就種智須達一相一行三昧六祖恁麼吐露山僧恁麼舉揚驀拈拄杖云昭昭然宇宙充塞無相可睹晃晃焉色空混融無跡可尋上乃天下乃地中間水陸空行此是佛殿僧堂三門廚庫僧是僧俗是俗敢問諸人畢竟如何是一相一行三昧卓拄杖下座忠宇葉居士撝金建新方丈請師入室從上諸聖當代群英總踞此室即今山僧又作麼生遂據座云恢彰佛祖家風克紹全提正令如何是正令全提句喝一喝便起自學止幻禪德請上堂的的大意沒量施彰對無儔侶脫體堂堂昔臨濟大師上堂云赤肉團上有一無位真人常在汝等面門出入未證據者看看此老宿與麼施陳驀拈拄杖卓一下云信手布施諸公了也復舉起召衆云者是山僧拄杖且道布施在甚麼處若向者裏辨得出略較些子如辨不出未免困於途轍秖如不歷程途一句作麼生道一氣不言含有象萬靈何處謝無私下座黃龍命人送信衣到上堂師拈香上首白椎畢僧問黃龍意旨轉至西來意旨且置請師敷揚師舉拂云會麼進云不會師云放一線道乃云摩竭正令少室真規風吹不入水泄不通西來已平地喫交了也賴有不二門頭放開一線撝拂子云人人威光閃爍各各不缺絲毫雖然如是更有向上一竅三世諸佛莫能宣揚歷代祖師提掇不起且道是箇甚麼物得與麼奇怪復揮拂子云諸人見麼若見得徹非特吾老人恩歸有地直下人人不落第二見不唯不落第二見抑乃各各知恩報恩秖如今日應時及節一句作麼生道自笑衣穿赤骨露一肩授手被金襴斂衣下座上堂忠宇葉居士善女余氏捐淨財修設香齊仍乞山僧升於此座為衆顯揚臨濟宗猷提持向上一路所願色身安泰入道無難遂召衆云且喚甚麼作臨濟宗猷宗猷又如何顯揚喚甚麼作向上一路一路復如何提持拈拄杖橫按云指縱萬別千差獨脫一字全無到者裏大師面目現在河北風規猶古所以迸開赤肉團用白拈賊奮奔雷喝捋猛虎鬚大機大用電激星馳於時脫羅籠自此出窠臼乃至衝天意氣格外提持都教箇箇契機人人悟同即此赤肉團全威烜赫大用風旋臨濟宗猷宛然見透頂透底露乾坤喝一喝上堂濟濟人天駢驟集相呈覿面沒多般揮拂云金錘影動寒光焰直下分明著耳觀喝一喝下座懷江周居士請上堂不是心不是佛不是物是箇甚麼脫或未委與諸人通箇消息舉拂云於此脫落豁開金剛正眼普照大千世界一毛頭上安身一一毛頭顯現一一毛頭既爾一一包融無礙人人遍普風光各各乾坤逼塞能為萬象中主法法頭頭自在下座臘八上堂舉世尊臘八睹明星時忽云奇哉一切衆生具有如來智慧德相但以妄想執著不能證得師云若論山僧見處月娟娟萬水不能沉風冷冷六窗自能啓老瞿曇垛生招箭認賊為子然雖如是知恩者少負恩者多遂豎拂子云大衆還見世尊立地處麼若見得許具隻眼玉轉珠回機路活風飛雷厲頂眼空若不見許具隻眼珊瑚枝枝撐著月扶桑夜夜日頭紅如或未委更聽一頌六年孤坐雪山翁一睹明星眼豁空百億分身無覓處是凡是聖悉潛蹤下座歲朝上堂拈香祝聖畢乃云今日正月初一大衆明明薦取遂舉拂云會麼良久劃一劃云識得一事事畢一即一切一切即一一舒一卷大都委悉草木叢林皆現妙相大地山河盡轉法輪道泰時清歌歡滿處既非世諦流布抑且納節應時正當恁麼時一句作麼生道淡蕩春風育萬物巍然海印照三千撝拂下座解制上堂僧問布袋解開天地闊腳下無私任往還般若門開即不問如何是一條白練去師云衲捲高雲千嶂碧進云劃斷青山未足酬如何是一念萬年去師云目前不許停機回互不讓當前進云芒鞋筋斷通消息枯木華開劫外春師云明明全正令梅花香更妍問封侯豈是尋常調肘後斜懸奪命符擒縱殺活無能敵三玄五位一齊周今日請師不接師云一片白雲不露醜進云萬里共長天三山瞻霽色師云點就乾坤面進云金剛寶劍截斷玄機正眼摩醯光吞佛祖師云頂門隻眼亞雙進云放行光蔽五天捏住風馳萬里師豎拂云且道這箇放行把住進云大衆證明學人禮拜師云是放行是把住問通天徹地即不問拈一放一事如何師揮拂云輕搖禿麈霞滿面進云秖如到家無別路又作麼生師云自道去進云獅子窟中獅子旃檀林內旃檀師云須珍重始得乃拈拄杖云本有天真妙絶凡聖結卻卓然解開無剩萬別千差頭頭自應明明一句沒囊藏坐斷毗盧遊大徑卓拄杖下座合鎮衆檀信撝金熏禮千佛懺圜滿請上堂師拈香竟乃云街坊檀信道心濃懺滿功圜福莫窮千佛光中空罪相重重瑞色嘯春風驀豎拂云還識千佛麼儻能未舉先知山僧直得下座安敢無事生事設或未然鼓舌搖脣去也佛者神通至妙蔭天人大器道者隱顯叵測育萬物為語其語盡性命捨惡趨善去僞歸真所以道一佛不二千佛奚別如處處水現在在月無去無來不生不滅若人皈敬者功利無邊感應符節如風行空中霫雨潤群卉歲豐時和士民安怗普天下刑措兵寢十方界兆斯王國雖然如是還有誠爾心盡爾性窮物理極天命底麼到這裏若非幹玄機無際窮實相源底不能趣入還有趣入者麼有則出來與伊證據苟或未然山僧與汝道破揮拂子云五色祥麟步天岸十影神駒立海涯下座佛誕興安州君然孟居士請上堂舉釋迦初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊師云世尊只知進前不能顧後拈拄杖卓一下云雲門大師來也道我當時若見一棒打殺與狗子喫貴圖天下太平老雲門恁麼道美則美矣善則未善你諸人作麼生甄別若甄別得放行好把定好放行挂弊顯妙把定深密奚宣更或躊躇山僧不免為諸人道破將此深心奉塵剎是則名為報佛恩下座結夏上堂人生易老壽命幾何生死現前將何支準所以道若不安禪靜慮到者裡總忙然召衆云莫慌莫慌了生脫死有甚麼難只在自己頓然撒手今日山僧不免擊開關鍵諸人於中三月安居一念不促誠堪賀喜狂妄心息苦惱熱止獲勝清涼證寂滅理雖然如是箇箇衲僧跳不出落在綣繢裏諸禪德莫比擬且向西來九十日討箇活路休將玄妙挂脣齒端午上堂舉佛眼和尚云今日端午世間人釘桃符書門閫使萬邪不窺其戶百鬼不入其門世間人又使針燒炙採藥登山使萬病不干其體疫癘不入其身大衆先德恁麼葛藤何不向膏肓穴上下一針我恁麼道且作死馬醫還會麼你諸人若不來山僧無可說得你既上來不免向你好肉上剜瘡你還知痛癢麼知得可謂如飲醍醐渴心永寂其或未然乃拈拄杖喝一喝云有甚掩處雖然如是於此門中未出見聞以為戲論遂失聲叫云阿㖿阿㖿你諸人剜卻一塊肉為甚麼西來長老受痛豈不見先德道懷州牛喫禾益州馬腹脹天下覓醫人炙豬左膊上忽有箇漢出來道和尚又苦作麼即向伊道無智人前莫說打伊頭破腦裂卓拄杖下座師誕日上堂豎拂召衆云於此會得無生示有生無身現有身即知四大五蘊自受用境界蕩然過現未來三際平等如是從上佛祖覓得的捷徑路頭教人身心一如身外無餘處壁立千仞所以道諸法不自生亦不從他生不共不無因是故說無生無生之理佛祖同源衆生亦爾如是山僧生不生既生不生且道今日作麼生折合以拂子作相云兩箇五伯文元來是一貫擲拂下座西密禪德請上堂拈拄杖卓一卓云一葉落普天秋一塵起大地收片雲鼓太虛群鴈鳴匝地西風頓冷野水漸寒明明顯露歷歷全彰復呈拄杖云有眼者總見卓一下云有耳者悉聞既見既聞且道佛法在甚麼處擲下云築著額頭磕著鼻解夏上堂九夏已過初秋方新百期制滿衲子自恣箇箇頂門眼開人人隨處見成便恁麼承當得去不妨一杖清風一瓢明月橫行天外闊步大方苟或眼目未清路頭未熟不免明眼相逢難為透脫直饒通方達者眼光爍破四天下猶在半途且不涉途程一句作麼生道撒手到家人不識更無一物獻尊前中秋上堂水中捉月正好修行朱砂畫月正好供養移舟趁月南泉拂袖便行掉棒打月仰山與長沙一踏直饒這幾箇老凍濃一時遊玩各露風光檢點將來盡是猢猻伎倆賣弄光影殊不知吹糠著米翻成特地雖然不因一事不長一智今日被山僧把條斷貫娘生鼻孔一齊穿卻擲向他方世界碧霄及爾翳絶陳年珮玦廓清而今揭露一輪新鮮光彩輝天鑑地耀古騰今直得桂魄增輝驪珠添耀遂豎拂子云大衆看看照境俱不立誰分上下池昔年鷲嶺徒勞話會當日曹溪枉用指陳千差萬別等恢恢四聖六凡一晃晃豈待娥眉若線而後方明中不容他彌滿清淨設或眼目定動更聽一偈皎潔蟾蜍無晝夜十分明耀向人舒堂堂密密何曾間一道寒光爍太虛結制小陂湖廣濟寺澄源禪德請上堂僧問昨夜霜風皎更清今朝杲日照分明獅威遠布狐蹤絶臨濟宗風耀古今濟上宗乘即不問弘開爐鞴事如何師云烈焰堆頭透體涼進云恁麼水到瀟湘異樣清月朗天心絶點塵師云蒼蒼庭柏鬱霜凌問拈起橫遍十方放下了沒蹤跡秖如不拈不放一著落在甚麼處師良久云會麼進云不會師云汝道不會是會了不會是果然不會進云不會不會師云儱侗禪和便打僧一喝師復打乃云十方同聚會三月一結制爐鞴大鉗錘佛祖急回避將長年念死話頭無繩自縛底禪和妄生測度認賊為子底衲僧驅來炖炖烈焰中煆得伊箇箇皮穿骨露然後蘇醒轉來即猛省得從前一片方圜田地不妨道盡大地無寸土到恁麼時節脫體轉身空裏步方知法法是通衢于時若有箇作家漢子出來云和尚既為臨濟兒孫必明臨濟堂奧大機大用既明堂奧大機大用因甚麼今朝結制只說門庭邊事山僧要問伊向甚麼處見臨濟堂奧門限脫或未知更為重說偈言三載西來唱祖機一條拄杖振全威狸奴白牯腦俱裂衲子通身喫得歸遂下座旋棒打散大衆歸方丈臘八上堂祖師門下更無等者世出世間了無別法若未得拌命一下不免被萬境惑妄立凡聖等障故我釋迦世尊於雪山六載臘月八日忽睹明星頓破空劫無明即云奇哉一切衆生具有如來智慧德相可謂箇箇成佛久矣奈何今人不踐正徑多入邪途被無明瞞昧過了一生雖然如是切忌承當且看釋迦世尊有甚玄妙超人處後輩謬解謂佛有成道檢點將來不無拖泥帶水正眼觀之都是閒名假字其後祇舍諸處四十九年說法度生既雪嶺睹星明得大地衆生一時成佛了又以誰作衆生受度於此曉了可名無為道人雖然猶恐有超凡入聖出格道理在未能脫略諸人將多生氣力併在一處極力直造到父母未生前故家田地方稱本懷方契玄旨如是佛恩君恩親恩師恩一時頓報正與麼時報無能報亦無所報者山僧恁麼告報未免明眼者哂今日不避檢責只要諸人自信得及良久云佛法無你會處喝一喝下座戊戌冬方伯聚五王護法同衆檀越於小陂湖廣濟寺豎佛殿上梁請上堂僧問古德道卓錐地也無和尚今日向甚麼處說法師云斬新豎方外乾坤縱橫挂域中日月進云野老已知堯舜力好把瑤琴徹底彈師云誰是知音者進云東風吹閫外庭際報新梅師云直饒玄會得也是眼中塵僧噓一聲作禮師云雪上加霜乃卓拄杖云擊大法鼓吹大法螺登大法壇演大法義廣濟乃智者大師舊隱今日山僧暫借升陟良以深愧志素非才明眼人前提持祖令此法印不從人得若正令提綱佛祖蹤泯放過一著聖凡交集所以道斯事不可有心求不可無心得不可語言造不可寂默通蕩蕩目前森羅頓現昭昭日用彼此無分非文字相絶見聞緣直下截斷衆流不留眹跡是日人天集會法以遇時略建化門中普示大衆顧左右云諸公見麼若恁麼承當能入一乘閫域蹈向上玄關坐微塵裏轉大法輪於一毛端現寶王剎茲者澄源禪德於此統理大檀越揮金鼎新大寶殿一木支大廈之室一柱回千江之流於時只要紳襟衆善莫忘靈山記莂永作佛法金湯正眼圜明重光祖印諸公還見此間公輸子麼以拂子招衆云起遂上梁臘八上堂十方普照坐斷乾坤大地絶塵誰人舉目昔日釋迦聖主正覺山中折本睹明星開正眼也是徐六擔版若真正道流豈捨長從短西來門下還有具眼衲僧麼驀豎拂子云我法妙難量非思議分別能解若擬分別卜度即落衆生境界只如不思量分別又是箇甚麼良久擲拂子下座立春上堂僧問雲散家家月春來處處華春魁獨占即不問牛過窗櫺事如何師云五九盡時春體露千林亂吐象先華進云一身頭角都過了因甚麼尾巴過不得師展手云只為在山僧手裏僧一喝師便打僧作禮歸位問死了燒了風吹灰散向何處安身立命師云十方世界覓無蹤僧禮拜師打云元來在者裏乃云正逢五九今朝盡溢目風光鼓劫外寒谷春回嶺梅爭馤所以時節到來因緣合會那堪意下摶量不用心中模楷隄楊金眼醒野水鴨緑濊光彩廓清兩曜明春風影裏乾坤大卓拄杖下座小參師受宗旨歸院小參拈起源流示衆云會麼曹溪旨臨濟宗黃龍法總在裏許且道以何憑據乃展兩手云我見燈明佛本光瑞如此衆作禮師歸方丈小參舉拂云大衆看看諸法蕩然奚拘奚絆汝於是中自生易難心源大統彌亙十方上上機人自然曉了不見南泉和尚道如斯癡鈍世且還稀歷歷分明有無不是只缺個丈夫志氣致織妄枉受疲苦汝欲得易會麼從曠大劫來無伊呈伎倆處無伊擬解會處無箇聖人凡夫出現汝前無句善言惡語到汝分上何以故覓善善無形覓惡惡非相既本無我喚甚麼為善為惡立那箇乃聖乃凡諸公信得及麼還保任得麼有甚麼回避處恰如日中避影還避得麼還隱諱得麼今之古之今古同時佛法玄旨唯契證知勿兢小緣礙於大事汝不見教中道唯此一事實餘二則非真吾今為汝保任斯事終不虛也敢問諸人如何是不虛的事還會麼各歸衣鉢下看小參大凡參學人須具自家眼識得自己心心眼明了腳跟點地將心相示方可諦當若認奴作郎把揚眉瞬目一語一默印與人為心要者此實未了吾今與諸人分曉說出各各聽受但除一切妄想現量思惟舉止即真汝心此心與靜慮塵境攀緣計度全無交涉即心是佛不假修證何以故應用隨照覓用處了不可得乃是本心善自護持結制小參開第二門三月結制於此高挂鉢囊放下袱子都教洞明劫外風光徹見本來面目山僧與麼道正是陷人坑塹埋沒仁者何故不見道覿面分付尚涉廉纖直下承當猶存情識所以道道人行處如火消冰箭既離絃無反回勢那有許多之繞直得盡乾坤大地無纖毫過患尤是轉句不見一色始為半提更須知有全提時節若欲做個透頂透底脫灑的漢子雖是恁麼一回可以往復三界獨步十方驀拈拄杖云便如西來拄杖子𨁝跳上三十三天𡎺著帝釋鼻孔東海鯉魚打一棒雨似盆傾若也恁麼峭峭巍巍活活卓卓運用通身手眼不落見聞知覺包括天地籠絡古今舉必全真縱橫歷落撒手懸崖便是到家消息直是西來要問伊如何是到家消息脫或未委更副一頌東西南北沒邊疆遍覆三千舌廣長轉地回天聲落落騰今耀古歷蒼蒼兩輪日月通霄漢八極風雲透座涼過得祖師關鍵客不妨於此徜徉彰至節小參群陰剝盡大心無依一氣潛回大化無跡洞山掇退果桌大巧無作魯公臺上書雲大任無力慈明揭榜僧堂萬法全彰漢女宮中測日一毫不露今日秀上座將世法佛法打成一片喚衆生作諸佛體亦何殊喚諸佛作衆生理未曾失冷地裏忽有個漢出來道衆生自衆生諸佛自諸佛何得混濫聖凡令他釋迦彌勒受屈只向他道你等諸人無始妄流轉莫不由此執定性凡夫聖所呵千手大悲推不出然領會在人不在法何也法無必固須是恁麼人便說恁麼話祇如古德道向上一路千聖不傳頂𩕳一機萬靈罔測意作麼生諸人還自擔荷得麼若未擔荷山僧更為傍通一線以拂子空中劃一劃云汝諸人還見空中寫兩行梵字麼若見何名虛空若不見當面蹉過所以道一動一靜未曾有纖毫異相更無絲髮許作見聞心識解會諸仁這裏見得便見得昔日五祖演和尚示衆云將四大海水為一枚硯須彌山作一管筆有人向虛空中寫得祖師西來意五字太平下座大展具禮拜為師若寫不得佛法無靈驗有麼有麼便下座還知演祖落處麼若知即知西來落處亦知萬木凋殘處常住不遷義亦知諸佛寂滅性都在衆生心行中祇如衆生心行中心心煩惱念念無明作麼生識得諸佛寂滅性祇如暑往寒來陰退陽生又作麼生明得常住不遷義果於其中明辨得分曉說甚麼動靜去來豈妨湛寂拈拂子擊禪床乃擲下云便如秀上座拂子相似拈不自拈依義而拈擊不自擊依義而擊擲不自擲依義而擲諦觀此義峭巍巍活卓卓橫亙十方豎窮三際拈時非拈擊時非擊擲時非擲如是了知洞然無礙報知音瞥不瞥泥牛吼處天關轉木馬嘶時地軸回晷運推遷日線長且道佛法長多少良久云九九八十一喝一喝除夕小參即今臘月三十晚若是明眼高流不在鑽龜打瓦若是棒頭取證喝下承當者千里萬里若論斯事直下無私輝騰今古不離當處那涉舊歲新年吐新納故直得萬機休罷一念融會說甚麼此際正在舊歲欲去未去之時新年欲來未來之候說甚麼世間富貴貧窮戶戶不同說甚麼憂愁喜樂家家各別然雖如是若是道業荒蕪未透祖關者只知事逐眼前過不覺老從頭上來時光易邁歲月虛消入息雖存出息不保今夜直須剔起眉毛仔細看不可作尋常放過而今緇素濟濟面面相覷且道祇圖箇甚麼良久呵呵大笑云兄弟們若尚留觀聽山僧未免相席打之繞西來者裏聚千聖於同堂不受纖塵會十方於一室那隔寸步超佛祖於一時至簡至易鎔今古於一刻最妙最神雖然隨家豐儉不可將無作有也要應箇時節拈拄杖云諸兄弟若信得去不妨省力可謂十世古今始終不離於當念無邊剎境自他不隔於毫端赤灑灑全露淨裸裸無遺可以使十二時不特使十二時亦乃逆推甲子便能反年頭作歲尾當日午打三更延一念為三祇不長促三祇為一念不短到此田地莫道閻羅大王那裏算飯錢縱饒釋迦聖主何處摸巴鼻還會麼謬加穿鑿傍觀笑收起葛藤任貶剝拽拄杖歸方丈立宗上人領江右周祥卿彭秀卿嚴文盛三善士請小參僧問龐居士一家悟道悟箇甚麼師便打僧擬進語師以杖擉退問法王座上饒紅舌拽動諸人鼻孔徹獅子吼獸腦裂各各具眼看親切聲未絶師云且道節目即今落在甚麼處進云謝師指示師打云喫棒有分問三世諸佛從此出歷代祖師從此入未審出入事如何師云朝到西天暮歸東土有僧出師不顧乃云萬法歸一不撥一塵一歸何處不立一境稱錘上拶出汁枯骨裏敲出髓無些子藉慣賣弄觜臨濟用金剛王望影猶難德山遣木上座追蹤莫及所以道黃面漢四十九年有手只好拿空白拈賊千七百箇有口惟堪挂壁只為大地衆生太不惺惺所以舌頭瀾翻平地波起手裏指東畫西口中說黃道青一著全提纖毫不露趙州柏樹子無根虛空有骨雲門乾屎橛臭氣潑天難聞狗子無佛性一點心如黑漆父母未生前面目夜夜天上星亂灑不是心不是佛不是物眼睛難見耳難聽麻三斤提頭拽不起放下卒難收金剛圈至小難跳一跳跳過栗棘蓬有刺難吞一吞吞下鐵鉢盛貓飯一頓忘纍饑西來村叟昔曾效顰也作這般伎倆不是等閒誑嚇平生所參得底直要涅槃堂裏用且道作麼生是這般伎倆咦恁麼一回方知道世間死不得的活人以活法死之世間活不得底死漢以死法活之吾不欺也遂擊拂子云還會麼良久云知音者少這些子要在直下承當負之而趨千聖羅籠不住十方呼喚不回有恁麼衲僧才可到此烹佛煉祖之場紅爐大冶之內一一與你拔楔抽釘解黏去縛做箇脫灑丈夫其或未透脫一路從上披枷帶鎖擎頭戴角老古錐折本消息九旬日內使現前衆兄弟打辦精神不可左商右量東覷西覷擔閣時光應是從前學解凡聖疑情一時掃卻向一念未起之先猛然省得渾身擔荷豈不慶快平生若是半疑半信取捨未忘究竟奈何伊不得縱有一箇半箇相似做得去翻去依他樣子簸弄識塵不肯全身信入今日衆居士撝金遠詣當山設齊山僧因齊慶讚多方委示便是沒羞恥有甚落魄雖然也與作軌格參重陽小參僧問如何是奪人不奪境師云遍界露形容昂藏絶眹跡進云如何是奪境不奪人師云寂歷無蓋藏直教眼睛枯進云如何是人境兩俱奪師云行不出戶坐不當堂進云如何是人境俱不奪師云驪珠閃爍光射衣裓進云謝師答話師云無毛鐵鷂過新羅乃云才過中秋又逢重陽炎涼倏改時節不饒心不是佛風生大野智不是道菊綻庭前華曾無媚人之心風豈有振人之意夫出家兒具大知見心不附物所以道真實明達能與諸佛同徹寂照忘知虛含萬象如今無一處不是汝無一處不分明無一處不露現若非到者箇田地爭免諸般滲漏何所謂心違境逆情暢物舒若有箇兄弟向者裏揭開夢眼獨露當前便見十方無壁落四面亦無門露裸裸赤灑灑沒可把逍逍遙遙騰騰運運也只成得箇了事道人若到衲僧門下千聖立下風誰敢出頭道且道衲僧據箇甚麼道理便乃如是良久喝一喝云千手拽不住為武昌太守劉公護法筠菴居士對靈小參拈香云以此妙香特薦尊靈現宰官身勤勞王事學博才優沛德施仁金湯法苑濟宗鳳麟滿衙芝蘭孕秀靄著聲名唱傳唯公以之萬民仰戴正宜榮耀百年富貴何期終不惑四齡踏翻生死路端坐涅槃城覺功名幻識富貴空千倉萬頃世上資糧積玉堆金兒孫活計幸佛慈悲垂手接引極樂淨邦瞻彌陀妙相率陀內院參慈氏真容三千銀世界任意逍遙十二玉樓臺隨心自在雖然如是此由化門未是到家且作麼生道到家句聻佛國天堂休措足腳跟一步即真宗安陸府城太音庵印文耆宿集各剎耆德結普同塔社弟子慈筏繼焰月幢穎石月修同衆禪德恭送得戒本師一真法主靈骨到普門寺入塔請對龕小參佛教未易墜五十二春秋以來作教中龍爪劃五天雲影為法中義虎吞三藏雄文垂手入廛接物利生開講肆弘毗尼孰不稱奇歎美非唯今少於古亦稀可謂千秋傑士一代法主也佛教失所望五十二春秋而云歸來耶去耶果離合非智眼而莫睹祖意教意果同異獨神心而了知當時恁麼來未曾來如今恁麼去未曾去公於真常不動之際而又安得有生乎死乎然則如是公必以我說為然也且道一公本來面目在何處還委悉麼直是世界生佛未形未具已前眉目十分顯露還有人於此識得去堪與大師把手同行不於意地中度量設或未然山僧不免將錯就錯隨例顛倒遂以杖指龕云若道這箇是則有兩箇了也若道這箇不是則又蹉過了也畢竟如何不蹉過沒兩箇面目本來無向背明明遍界不曾藏薦忠宇葉居士法名照意對靈小參世間最苦唯生死是箇縵天底網子盡大地裏賢愚人被伊籠罩莫可逃獨有大丈夫漢直下翻身透脫忠宇葉公生緣本地自幼好善長素念佛山僧往歲乙未據淨土丈室公捐檀財仍誘衆姓建百二十日禪期弘揚大法傳授毗尼公遂爾圜具丁酉歲山僧遷豐鎮西來祖剎公不惜身命出己財傾心護持十有五載山門不幸歾此股肱眷戀相關不勝涕泗今則報緣謝盡長揖人間然既告寂夫復何云雖然還明得金剛正體麼汝等諸人向甚麼處相見若也見得塵塵爾剎剎爾突出無位真人發明現成面目直得上不見天下不見地中不見聖人凡夫萬象森羅內不見眼耳鼻舌身意外不見色聲香味觸法說甚洞達承當設使三世諸佛歷代列祖各各箇裏不資一毫所以道正體獨露萬象無所覆敢問諸人忠宇葉公即今在甚麼處還委悉麼正體無生無住處如如處處是全身以拄杖卓一卓薦葉門善女余氏法名常照對靈小參師舉拂云此一機天不能蓋地不能載游四生不能絯歷生死不能礙風雨不能隤水火不能壞佛祖覷之無路鬼神度之難猜淨裸裸赤灑灑寸絲不挂所以道目前無法森羅萬象眼中塵脫體無依無影樹頭消息斷截斷聖凡情解剿除惡見稠林世出世頭無向背人間天上絶羅籠如斯見得覓聖凡亦不可得迷悟亦不可得生死亦不可得去來亦不可得既是去來生死迷悟聖凡了不可得者所在無邊剎境自他不隔於毫端十世古今始終不離於當念示一毫端現大千沙界擲大千沙界于一毫端大中現小小中現大翻濁處為淨域易短壽作長年生死為游戲三界作旅亭從來徹古今一一非分外今日山僧于靈柩前復舉拂云無非舉揚此一機追悼余氏老孺人直下諦明此一機以見昔日生本非生全體恁麼來今日死本非死全體恁麼去且道伊歸何處夢斷人間幻化機神游天上真常地示衆示衆今朝七月一北斗面南看大智得大用大人具大見高高無上深無際文彩已彰錦簇攢揮拂云大衆看看聻復舉三聖云我逢人即出出即不為人興化云我逢人即不出出即便為人師云兩箇漢間出並列提持一人高提祖印獨耀寰中一人大啓洪爐烹凡煆聖各出隻手發明臨濟正法眼藏好則好未免二俱失利殊不知臨濟一宗掃土而盡且道利害在什麼處具眼者辨取還委悉麼擲拂子云金鏃慣調曾百戰鐵鞭多力恨無讎因雪示衆長空酣戰玉龍陳潑地潑天呈似人一色渾然銀世界箇中何處不超倫示衆佛祖出興於世無法與人只要一切衆生自見本性本性自見則知一切法即自心性成就法身不由他得所以從上佛祖不令人泥著文字只求休歇者何祇教伊明自心見自性至於德山入門便棒臨濟入門便喝已探頭太過何更立言語且如諸公坐立儼然歷歷聽法無形段底一著子還薦得麼若也薦得與佛祖把手共行如或未薦自是渠儂甘為下劣今既至寶山不可空手而還還委悉麼須是獲寶者便好向伊道禍不單行福不重受楊紫雲寧開之率衆善士請示衆此箇色身四大假攢聊憑一氣呼吸無賴二六時中妄逐聲色強安名姓不思年華長短旦夕安危命若殘燈期約不定從昔至今生死海中頭出頭沒甘受淪溺不求出離是故至聖悲心不已出現於世罔倦長舌譬喻言辭種種方便說法開示辭宏如海涌波騰理貫似珠回玉轉欲令衆生悟佛知見豈徒然哉惡業沉迷者難遭善根深厚的易值今日衆居士知身是幻奉戒持齊從教攝心有進禮念無虧攝心有進功成就禮念無虧德漸優功就德優水澄珠現此際慎勿作容易宜生難遇想山僧斯說未圜更為葛藤一上真如界內本絶凡聖之蹤平等場中原無迷悟之跡更討甚麼地水火風六根六塵色聲味觸生死去來都盧是箇真實正體了無異相箇裏還有人當處解脫直捷承當底麼若承當得迥絶知見更無覆藏如今活鱍鱍淨裸裸孤迥迥峭巍巍廉纖不涉一切截斷當恁麼時裂轉上頭關捩子眼聲耳色不思議設或躊躇抖擻精神期早悟莫教辜負兩莖眉普說普說舉古德云衲僧是通變道人若遇鑊湯爐炭諸般厄難又如何免得若是免不得何名通變道人作麼生是透脫諸般厄難底句師云諸禪德鑊湯無冷處衆苦不能到措意者則差若人鑑辨透脫得許伊出得陰界莫有透脫者試對衆道看山僧為你證據抑且不辜負古人若透不得決欲臘月三十日四大分散時要得這著有下落無有是處到此諸人自不本分以有所得心求無所得法與麼又爭得云何是有所得心靈利聰明心思意想度量計較底是云何是無所得心度量計較不到心思意想不及靈利聰明無處安著底是箇裏皎然如白日青天不動不變無增無減當人應緣日用處物物頭頭明顯取之捨之蕩蕩無礙如水上葫蘆拘他不得豈不見釋迦世尊在法華會上盡力只道箇是法非思量分別之所能解此是釋迦老子開方便顯實相之包括也志公和尚云內外追尋覓總無境上施為渾大有昔雪峰存禪師亦為此事不明三登投子九到洞山尚機緣不契後參德山鑒禪師造室中問從上宗風以何法示人德山云我宗無語句亦無一法與人後又問從上宗乘中事學人還有分也無德山拈拄杖打云道甚麼雪峰於時撞破漆桶諸禪德以此諦觀計較心思靈利聰明此箇門中一點也用不著所以云般若如大火聚近之則燎卻面門擬思躊躇便落意識者裏唯證者方知若未證者直須證取方名真正出家兒若心不正心外取證是名出家外道不堪為種草永嘉大師云損法財滅功德莫不由此心意識是故心意識乃障道業亦使人七顛八倒儘在外邊走為諸不善䜋則還源達本不逐其末但得本其末自至衆禪德既有窮究此道之心誠欲立堅固志挺身勇猛直前不至大休大歇大解脫處誓不退墮驀然向心思意解計較不及處見徹父母未生面孔即是伊脫生死放身命處也久立珍重皈依弟子皈依女弟子嚴貴鳳安門寧實恆敖子華張門鄭實勝楊實茂李門張實曉安實泰尼弟子實相助緣耆德實真穎石實能法弟子最正最悟戒弟子海月同捐資敬刻秀野和尚語録卷第一用廣流通伏願人人豁開正法眼各各悟證無生地者康熙二十三年中秋日謹識檇李吳知先敬書禾郡曹文雄繡梓
