front:
  text: 重刻西來和尚語録序丹霞禪師劈木佛燒取舍利院主呵之鬚眉脫落秀大和尚語録先於辛丑年刻成行世祝融峰頭回風爇焰光燭四天下大地六種震動板中舍利隨風雨下學徒愍後來聾瞽不聞不見復於山邊水邊竹林池沼邊明光殿邊茆屋草茇邊百草枝頭邊糞壤土堆邊拾取一二復成十卷刻成付使者問序於豫余焚香頂禮命使者於庭曰當日祝融老人業已和盤托出今日又煩木上座一一宣揚使者曰也須居士證明請為木上座點出雙晴普施後來學者余曰使者大家照顧眉毛好分付毛頭記室不得矢上更加尖從此法雨周沙劫時康熙戊午正月上元之吉武昌太守筠菴居士劉餘霖沐手拜題西來秀野林禪師語録序往歲登百丈山與秀大師晤言一室殊深景仰辛丑之二月師録既脫草隨過峴南惠然臨貺而以序言見屬余自愧佛頭著糞矣雖然有說焉茫茫宇宙三聖鼎分要之闡明心性而止試觀達磨初入東國不立文字直指人心見性成佛明乎赤子知能即聖神功化亦曰娘生面亦曰不壞身亦曰真如法藏斂之則一掬散之則三車十二部千七百則公案古今諸尊宿語録一切文字禪浩若滄海返而扣之自本自根處絲毫無增減也人若於此認得真站得定磨鍊得潔潔白白顯現本來面目何妙弗臻哉古德云說得一丈不及行得一尺大師信根深厚道力清堅自童山參請以還益加熏習濟宗一脈與老黃龍覿面印可是故著為法語字字從心性中出頭頭自體驗上來掃盡葛藤打穿漆桶授者非啞謎受者非盲拳嘲風弄月之間極得意忘言之妙方今門庭四出壇坫叢開提唱若西來者指不多屈矣録中奧旨賴有巨公大手筆徹底掀翻何難使日星之在天江河之行地即欲向此外贅隻字亦奚以為余不文不得已而揚聲止響尾之續不猶愈於頂之屙乎但所願世之覽者不言而躬行因權以化實舌尖無骨當觀言句之總持眉稜有筋請具戲游之三昧庶幾哉不負師意並有鑒於余衷也夫謹序大清順治辛丑孟秋楚臨沮珂雪居士方叔壯芑田甫和南拜題秀野林禪師語録目録首卷序文二道卷第一上堂小參示衆普說卷第二法語拈頌機緣書復像讚聯芳法派卷第三住襄陽府黃龍禪寺語録上堂小參法語偈雜著佛事壽塔法語行繇
