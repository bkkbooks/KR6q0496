body:
  text: 嗣法門人最正等編繼席襄州黃龍禪寺語錄康熙庚申歲二月二十三日師於安陸府豐樂鎮西來禪寺受襄陽府列紳士山主眾檀護暨各剎耆舊同門昆季本寺監院請於三月十六日進院三門廣大法門一道直截信知家裏人自然無內外拽杖便進佛殿法身無為不墮諸數直下會得應緣即現呈坐具云大眾莫言不見乃展拜韋馱殿感應三洲剎那遍阿僧祇行彈指圜寥寥坐斷魔軍表弘護法門不計年先師像前平生沒本據妄談般若罪無涯端的有來由項上鐵枷先擔取黑豆換人眼睛爭怪得者老漢追憶老凍濃心肝懸樹頭胸中更有一般毒不肖兒孫孰敢觸遂拈香作禮方丈拈拄杖云新黃龍相席打令看風使帆不惜帶水拖泥一任諸方笑怪以拄杖卓一卓喝一喝便起即日眾護法居士等請上堂師至座前拈啟示眾云此謂之無見頂王三昧甚深微玅法藏言言見諦句句朝宗諸公應須不作文字解不生紙筆見如此符合文彩全彰還知端的麼如或未委試聽維那宣讀宣畢以拄杖指座云看看者寶華王座欄楯階陛天繒玅寶香光雲網殊勝莊嚴一一皆由諸公多生修行集聚善根所共成就如是功德今日於一念間齊顯露了也還見麼遂陞拈香云者瓣香至尊至貴名超優曇華為蓋為雲葉覆大千界虔爇寶爐端為祝延今上皇帝聖躬萬歲萬歲萬萬歲欽願福基等乾坤永固國運與兩曜增輝八荒歌堯天之化育四海樂舜日之豐腴復拈云者瓣香補袞仁主鹽梅聖化爇向爐中奉為滿朝文武闔國公卿道府縣各衙現任列位尊官伏願常居祿位永作金湯次拈云者瓣香足見僧賴護法以顯護法賴僧以鳴今日滿諸護法勇衛協贊嘉謨爇向爐中奉為闔郡紳士在筵檀護列剎高賢同門昆季本山兩序監院等伏願緇俗同明正法眼見聞咸發最勝心又拈云者瓣香已在西來拈出多年今日人天普集不免從頭說破廿載行腳蹋破芒鞋江南江北受盡風霜曾經數員知識提攜實乃緇素難明一朝天童會裏幾遭密祖毒棒當下知歸自吳越抵荊南撞入百丈山中禮見不近人情老和尚摧折一上痛恨難忘昔年親到者裏印可今日相承繼主此席茲對人天眾前拈出爇向爐中供養前住即此山傳臨濟正宗第三十三世先師奇大和尚用酬法乳斂衣就座智覃門人白椎云法筵龍象眾當觀第一義師云未白椎之先則無當觀之義任他五目不能睹四辯莫能通直饒薦得落七落八且第一義還有知落處底麼出眾與新長老相見智覃門人問玄風大震獨巍然拄杖撩天接上賢高豎法幢天地動靈山密旨請師宣師云正法眼藏無古今般若真燈照天地進云今辰眾大護法一會儼然恭請和尚上堂說法且道作麼生相為師云相逢自有知音客何必清風動五天進云龍象駿奔咸鶴望普施一語利人天師云雷轟電掣風行艸偃進云一句迥然開祖胄千秋法運喜重新師云也知恁麼讚嘆進云從此黃龍光不夜人人徹證續傳燈師云勒回河北千年運直接曹溪萬派春進云西來大意越今古百丈宗風遍大千師云好事不如無乃云疊巘峰巒毓秀泉清溪壑源長凌霄殿閣巍曠龜鑑人天道場祕密寶藏八字打開具種智者頓然玅達一段祖父田園界畦四至分曉只要親到一回便見百丈弘規所以道隨處作主遇緣即宗法隨法行法幢隨處建立展臨濟三玄戈甲會曹洞五位君臣敲唱雙行殺活自在拈一莖草穿衲僧鼻孔布縵天網打衝浪錦鱗拈拄杖一劃云新長老一時掃蕩何故幸逢堯舜世自合樂無為復舉阿難問迦葉世尊傳金襴袈裟外別傳何法迦葉召阿難阿難應諾迦葉云倒卻門前剎竿著後來汾陽昭拈云不問那知五祖戒云露翠岩芝云千年無影樹今時沒底靴師云掀翻海嶽求知己為報時流莫浪猜且道與三大老相去多少如此涇渭得便會得阿難問迦葉荅之意亦乃爍迦羅心靈然不昧摩醯正眼光照無窮所謂真機普應大用全提還會麼莫怪從前多意氣他家曾蹋上頭關結槌云諦觀法王法法王法如是下座謝辭不錄當晚小參塵劫來事只在目前緇素濟濟燈燭煒煌百丈山從地而起插劍峰崒立層霄是襄州勝境黃龍道場殿堂虛敝煙雲蔽虧正法眼藏頭頭顯出玅明心印處處全彰須知靈利衲僧未舉早能委悉何煩黃面瞿曇出現於世寧用缺齒老鬍航海西來諸方尊宿分宗列派各立門庭具驅耕奪食之機摧邪顯正之用正眼觀來總不消得我此門中別無奇特只貴明自心見自性聞聲見色色色仍舊穿衣喫飯日用尋常不必望求勝玅以為自得豈不見古德云欲識佛祖心須向眾生心行中識取欲識常住不凋性須向萬物遷更處薦得多少明白多少現成今人不能洞明蓋是自生知解礙卻本來一段光明山僧今夜始入此門初相聚首竟不肯說心說性說玅說玄恐增諸仁知解只將現成一句子覿面拈出令箇箇自悟自證自家境界且作麼生是現成一句子以拂子擊禪床三下二月二十三日師受襄州眾護法居士請住百丈山黃龍禪寺於西來禪寺上堂拈帖示眾云兩度三回推不脫今日依前把不住不是人情之故亦非時節因緣因甚撞頭磕額豈意因緣會遇只如今日動靜不以心去來不以象諸仁還知麼黃龍虛法席使者至再三思昔得法時二紀有餘年豈謂蒞晚景檀護重相關開函讀來簡叮嚀見楮端符子既已至不問路行難方撾集眾鼓龍象咸欣歡先師未了底應時起波瀾敢問諸仁如何是先師未了底待至黃龍方與諸人道破下座佛誕際明習居士請上堂僧問一降皇宮即不問未出母胎度人已畢時如何師云已降未出俱鈍滯躲根禪客切須參進云因甚又睹明星悟道師云明眼人難謾進云十方同聚會個個學無為如何是學無為師云相識還如不相識進云此是選佛場心空及第歸如何是心空及第歸師云行不出戶坐不當堂乃云天上天下行履自由慈愍四生示現閻浮故我釋迦老人降皇宮出母胎便會指天指地周行七步目顧四方云天上天下唯吾獨尊如此何等慶快若非得大自在安能如是然雖逞俊不免傍觀者不肯所以後來雲門大師道我當時若見一棒打殺與狗子喫貴圖天下太平也怪雲門不得何故祇為亂眾生太甚今日正當此際山僧乍主法席茲者際明習居士揮金辦齋供佛及僧城南一境居士各捐淨財延仗本堂禪侶諷經禮懺慶佛聖誕山僧陞座無法可說聊申一偈以應時節乃展拂子云年年春色滿毘藍堪笑瞿曇入鬧籃纔出母胎揚醜拙便開大口脫空談韶陽痛恨要捶殺棒下分明絕指南絕指南至今一個未相諳試問諸人諳不諳如諳卓爾渾然無向背西天佛是老瞿曇下座開爐結制上堂斯時法鼓纔鳴大家一齊散去可謂超出古今更擬撒土拋沙不免起模畫樣諸禪德既到黃龍相從參禪發明生死大事須依山僧行履他後決不相賺箇箇都要屏息萬緣一心向道追復黃面老子百丈已前所行頭陀之行是謂家風此之苦行頭陀教乘備載請自校看雖然今人難齊古人且請其中行得一半庶使得霑頭陀苦行之少分耳不可類此時學者總不問著甘為無慚愧人大法驢年會得只如黃面老子當時饑則統眾持缽入城乞食歸則各處岩穴之間其後匾檐山和尚唯食橡栗度日趙州諗和尚三十年不開口問人不雜用心芙蓉楷禪師不發疏簿不邀化主唯受澹泊又有丹霞然禪師一生只箇布衲此諸尊宿俱是行頭陀行家風所以各各魁壘秀出於當時而歷千古之下為世出世間之所尊諸禪德若憑此苦行行持久之不移不易到者裏更須知有轉身喝一喝云百丈巖前輕撒手大千沙界露全身復舉雪峰示眾云三世諸佛向火燄裏轉大法輪雲門云火燄為三世諸佛說法三世諸佛立地聽師云雪峰雖則畫蛇添足未免水寒於冰雲門固爾直截指陳也是承虛接響黃龍今日結制開爐亦不鑿壞常住地亦不過費常住炭只教寒時休嫌寂寞冷處卻要溫和若能如是體貼不惟免撥灰弄火亦且無佛見法見以拂子畫相下座上堂寒則普天匝地寒熱則普天匝地熱雖則寒暑凌奪玅體本無生滅是以彤雲羃羃朔風凜凜當此之際蠢動含靈森羅萬象乾坤肅靜庶物蕭然於時衲子放下腰包脫卻芒鞋同居百丈不拘堂內堂外不容學佛學祖但以十二時中行住坐臥著衣喫飯運水搬柴磨麵輾米迎來送往主伴交參無功用行隨緣自在人人本有莫大威光如龍得水似虎靠山黃龍門下既不容學佛學祖也不圍爐添炭直教箇箇寒徹骨髓因甚如此冷灰爆出黃金豆卻勝諸方熱鬨禪因事上堂二十餘年玩馬騎今辰卻被驢兒撲一撲撲倒地無人攙得起卓拄杖云幸賴拄杖子著力撐住不然直跌倒金剛輪際尚無歇腳處在此時若逢白牯便須倒退三千里若見狸奴更須別路讓他還拄杖子道長老長老平日硬糾糾地生按佛祖今日如何者般委蛇呵呵大笑云拄杖子你卻不知先人法幢退己讓人也是大丈夫事上堂自客歲孟冬暨望之期十方雲集內外雍容同結制開爐共向無煙火冷灰裏豆爆世界無處簸曲指數將來看看九十日然雖慎初護末原始要終首尾一如全無罅縫不參禪道佛法大家共樂無為同諸人住一冬山僧縱有一言半句盡是家常惱人說話來朝罷爐諸人或東去西去他時異日莫道黃龍不為人好佛成道日在北楊居士請上堂昔日釋迦世尊睹星悟道今日西來覿面指出明星令諸人一時悟入遂拈拄杖呈起云拄杖不是明星佛殿不是明星山門廚庫不是明星露柱燈籠不是明星森羅萬象不是明星卉水叢林不是明星祇如釋迦夜睹明星悟道與現前諸人見山僧拄杖是同是別於此悟得直得坐斷聖凡窠臼上無攀仰下絕己躬淨裸裸赤灑灑無依無倚無得無失可謂男兒自有衝天志不向如來行處行卓拄杖下座師繼席黃龍以西來授智覃首座紹席上堂祖脈悠遠法海汪洋是真正種艸可續其後裔大力量人能泛波瀾若論曹源巨浪包含深廣若鯤若鯨若蛟若龍無不從中躍出然不躍則已一躍九萬里程扶搖直上扶豎佛祖正宗還他過量人能持過量事過量人已見過量事行則同行坐則同坐灼爾西來的意自然上古風規既是權柄在手便合與人雪屈且道應時及節底句子作麼生舉聻滅卻老鬍種族扶起千古叢林喝一喝佛誕糾首善士何燦然安士俊周文黌李文魁楊大祥關明皋夏實禛魯國輔等請上堂拈香祝聖竟僧問佛身無差別充滿於法界充滿法界即不問佛誕法語請師宣師豎拂子云攢簇不得底進云天人群生類皆霑此法力師云昔日世尊漏逗今日山僧饒舌進云將此深心奉塵剎是則名為報佛恩師云一言已出駟馬難追乃展拂子云玉麈高揮為舉揚分明佛面露堂堂今朝對眾難收拾眼上依前雙簇長諸人於此薦得則見今日吾佛立地處設或未委更為指陳故我釋迦老子啟基刱業開方便門原為一大事因緣出現於世愍三界火宅焚傷悲四類欲流永鶩遂爾離兜率降迦維淨梵國王為其父摩耶夫人為其母以茲證真常玅體運無作神通慈濟無方度諸含識正所謂淨法界身本無出沒大悲願力示現受生正法眼藏涅槃玅心實相無相微玅大法直截吐露分付了也釋迦老子本命元辰亦乃諸人本來面目覿體無私縱橫自適且不負眾善士年年打破慳囊運出家珍詣西來禪林禮梁皇寶懺慶至尊牟尼所謂一念欣喜心能滅河沙罪果報福德因生生無棄背人天法界中諸佛同歡會還委悉麼明心須讓英靈漢成佛還他過量人復舉世尊初生一手指天一手指地周行七步目顧四方云天上天下唯吾獨尊後雲門出來道我當時若見一棒打殺與狗子喫貴圖天下太平師云世尊可謂龍袖拂開全體現雲門真乃象王行處絕狐蹤雖然如是一隊漢遞相脫空二俱不了還有撿點得出底麼如無山僧不免別咎休去也還知落處麼世尊不解覆藏惹得雲門眼熱祇如今日應時慶祝一句作麼生道九龍灌沐自招得難洗今朝一面羞卓拄杖下座開之甯居士建千佛懺請陞座根原悟徹見全修祖意明明百艸頭隨處施為能脫略入流終不肯隨流舉世尊問波斯匿王云汝以何相觀佛王云觀身實相觀佛亦然觀佛亦然觀法亦然法界眾生界根根塵塵一切清淨師召眾云欲識佛大寂滅相諸人但盡攀緣於此薦得一切心即佛心一切相即佛相一切法即佛法一切語即佛語心也相也法也語也且道一也二也同也別也不見道二由一有一亦莫守一心不生萬法無咎蓋山僧往歲甲午卓錫普門丙申遷住西來而開之居士兩處饋供綿遠不絕壬寅佛成道日夫婦同到西來求受菩薩大戒越今辛酉廿有六載抑此信心堅固夙有善種今冬特延禪侶就家熏禮梁皇法懺仍請山僧陞座舉揚般若且般若如何舉揚不免倩拄杖子為諸公通個消息遂拈拄杖卓一卓云孜孜竭力道心濃懺法功能豈易窮今日親蒙千佛記信知男女體元同祇如善人家庭營齋禮懺祈福延生聻復呈拄杖云揭示盡兮又何說壽嶽高兮福更洪下座德明劉居士六秩禮懺請上堂冉冉流光速季冬將歲暮朔風臨古幹共唱無生曲句句非別詞單談本面目還識本面目麼於此薦得坐臥經行任所之雙親罔極已酬足亦知自家壽量等虛空不落人間花甲數是以特至西來辦供禮千佛法懺仍請山僧上堂為眾舉揚此事既然如是豈可囊藏乃豎拂子云看看箇裏會得釋迦不先彌勒不後迥超那畔獨脫今時無分凡聖奚論人天祇如用益福齡超出壽量一句作麼生道不萌枝上春秋古無影林中日月長下座儀真縣芮門汪氏實瑛請陞座乃云斯一段大事不分男女只貴痛切信得及底向未舉已前一肩擔荷若是思量了無交涉豈不見趙州諗禪師問南泉和尚云如何是道泉云平常心是道州云還假趣向也無泉云擬向即乖州云不擬爭知是道泉云道不屬知不屬不知知是妄覺不知是無記若直達不疑之道如太虛空廓然蕩豁詎可強是非耶古德將心一時吐露了也以拄杖呈起云見麼有眼同見擊香几云聞麼有耳同聞既同見同聞無儻無偏所謂無邊剎境自他不隔於毫端十世古今始終不離於當念行住坐臥自然虛而靈寂而玅三世十方空蕩蕩無佛無祖無眾生山僧與居士恁麼道也是無風波浪生除夕是年三月復往吳郡檇李挂錫資勝禪林刊錄畢旋至漢鎮大悲禪院訪白雲老宿恰值歲杪承道愛堅留過歲設齋請小參山野推脫不得不免應個時節揮拂子云不是心不是佛不是物是個甚麼良久云千聖仰之莫及萬靈覷窺無門威音王前淨裸裸赤灑灑威音王後風凜凜峭巍巍臨濟喝下承當了沒交涉德山棒頭取證且過一邊直饒總不恁麼終非俊敏所以道我若真正舉揚法堂前直得艸深一丈事不獲已向諸禪德道盡大地是個解脫門盡大地是個光明藏盡大地是個金剛眼若作恁麼會悉唎悉唎不作恁麼會蘇盧蘇盧恁麼不恁麼總拈卻悉唎蘇盧蘇盧悉唎截斷三路葛藤放下舊年曆日管取百城春暖四海浪息還委悉麼一歲今宵盡來朝正月一中秋晚參嵒桂飄香梧桐葉落體露金風應時及節明明百艸頭物物西來意直下一見一切見一聞一切聞一了一切了一證一切證方知心外無法法外無心心外無法正如中秋一月溥現一切水法外無心一切水月二月攝今者月天上人年登半百虔辦香華燈燭珍饈玅供仗延禪德熏禮千佛寶懺仍設嚫齋普供大眾公願已滿壽福無盡且應時及節高低溥印一句作麼生道夜靜江涵千顆玉清光遙散萬龕燈結冬制晚參鬧哄哄處有鬧哄哄處的佛法靜悄悄處有靜悄悄處的佛法若是鬧哄哄處依舊靜悄悄少有些子氣息若是靜悄悄處依然鬧哄哄底可謂太殺辜恩若向這裏擔當得去不遣悟迷親證無餘所以道萬法是心光諸緣惟性曉本無迷悟人只要今時了敢問諸人如何是了底一著子卓拄杖云千山勢到嶽邊止萬派聲歸海上消為心海月海玄機剃度小參揮拂子云一二三四四三二一全體脫塵埃自心莫放逸能為大丈夫頂眼明如日火裏發青蓮山岡出白璧佛祖盡欣歡怨魔悉悚慄好記取勿忘失復揮拂子云若向這裏親薦得從今不是等閒人除夕時窮日窮月窮年窮三十六旬窮過了東村王老夜燒錢西來並無一物應箇時節豎起拄杖云祇者個無窮無盡歷劫經年經月經日經時隨分應用總不涉蔓相牽遂靠拄杖云歷劫得來赤骨立乃展手云拍雙空手接新年法語為楊門高氏法名實潔老孺人對靈法語撝拂子云山僧對靈吐露全無一字聊且應時及節只得暫為指注且作麼生指注自己一點靈明之性覿體與三世諸佛平等從來無去無來無生無死真光廓然洞照萬象高氏孺人六十八年前全體恁麼來金雞抱子離青嶂彩鳳銜花下碧霄六十八年後全體恁麼去水底泥牛銜月走雲中木馬逐風嘶高老孺人還委悉麼此是西方安樂國從來本性即彌陀越宗禪人辦齋供眾請法語古人道理障難除情塵易遣殊不知盡十方世界空索索地求一法可當前了不可得有甚麼理障可除情塵可遣雖然言中有響舌裏藏鋒切忌佛殿上廊廡下撞著露柱復舉法眼和尚偈云見山不是山見水何曾別山河及大地總是一輪月法眼恁麼道西來則不然見山是山見水是水到處走來不似家裏偈壽武昌太守筠菴劉護法大誕諱餘霖法名實超號遠公不負靈峰曾記莂如今握手樂無生仁風溥扇楚山淨雅德弘傳天下聲邇對南嶟稱壽酒遐瞻北闕感恩榮欣膺軒冕當清代莫惜賢勞荅聖明贈江南通州天與蔣護法諱時泰法名實寵號智威天命寰區榮耀遷高居顯宦政聲傳名山古宿曾親覲疏爵潔修果益堅道契神交能一默緒言過辱爽談禪臨行麤箑引新句護法深心甚藹然贈江南通州夢齋潘居士諱銳法名實宣號智弘時人不識但聞名渠是江南丹鳳鳴捷出搢紳捐富貴頓開心地證無生深抽禪髓廓宗眼著揭修途保障城泉石光輝承願力灼然高照亙天明癸卯除夕作奉居智党元戎歲交溢座笑言雷喬木嚶鳴煖色回短燭紅光今夕意觚稜白釂古人該華懸近圃春堪摘高榭護蘭風正開應節市廛喧爆竹賢良俊傑奮雄才居智党居士命贈鍾祥縣星賓程邑侯頌聲德望崇千仞政化仁風定一方惠遠民懷真父母蒼生今古頭甘棠示明宇張居士松梢微月夜初懸皎皎清光寥廓然大抵人生難共會獲團圜處且團圜寄泰徵汪文學一翳在眥華亂墜相逢狹路難迴避天然佛性事誰明日用纖毫不費力次酬襄州芑田方居士韻野衲何人媿不禪道存顏巷意幽玄乘因王化垂千古且把新詩樂性鉛丁巳春會稽圜照沈居士前以佳章見貺余愧不敏敢不敬裁俚言以和兼五旬之祝微樽並祝南山齊日暖風和奇卉萋物物拈來信可達胸中無悟亦無迷示文盛嚴居士心光虛映絕偏圜物物頭頭本寂然鳥跡空中無倚靠幾行鴻雁落霜天示郡山敖居士合眼開眸重露布雙明一句無差互於中切莫更騰疑法法頭頭絕去住壬戌春漢陽藎臣周護法至方丈索偈遂贈之威音那畔箇消息顯露明明在即今儒釋傳持敷正化雅為符合卻堪任贈江南儀真汪護法君耀居士居士身而佛祖心雙彰兩相護叢林信由福慧多生種受囑靈山箴古今贈羽聖芮居士紹來曠劫好家門自得吾真萬累諼一箇閑人天地內般般繼嗣有兒孫祝穎石上座六旬威音那畔菩提種傑出須彌勢獨聳眾曜潛暉杲日懸緇素濟祝大椿年大椿年劫矸不能比勁堅贈罕拙上座浙歸南方參遍罷行腳心眼圜明觸處廓寸步寧虧達本源灼然放出翀霄鶴示純然禪人物我同源佛祖機古今不易絕依俙堂皇迥迥坐聲色惟爾純乎獨振威宜城恒源鄭居士受戒求偈分明非戒亦非心平地不栽荊棘林法解勿存塵自盡妄情暫動業還深四禪畢竟無成壞十世何嘗有古今遏下威光再為說杜康臺子是知音贈智覃首座金毛獅子解翻身驚倒閻浮主地神彈壓叢林新氣象不施一喝主賓分贈指凡法姪道人胸次機輪活腦後常輝萬里光空劫已前一段事先賢猶待替宣揚祝法海西堂五秩熏風感萬物雨露發新條瑞應端陽節願乘華柳朝無瑕仁實玉有美佛能超天命蕤賓月相呈景趣高示敏慧悟書記躍出威音無措足門庭超絕聖凡路世間世出越群儔卓卓巍巍全面目祝月天都監五秩丹桂飄香正此辰月華生彩現全身拓來山色可行樂捩轉秋光玅入神撥境只因心未了忘緣常與道相親難將甲子匹空狀今古何曾有二人贈密宗監院監院多年為法門一毛頭上立乾坤直心忠膽眾魔畏白牯狸奴歎善哉示智宗維那誰問宗通與說通懷奇大有古人風金槌颺下無諸佛正合全肩荷此宗示聯宗書記參禪宜早慎斯時錯過光陰懊悔遲當下洞明佛祖心堂堂出格丈夫兒示尼覺妍禪人覺齊佛祖太巍巍妍淨智圜逞玅機聖解凡情俱泯釋頭頭自合契玄微示尼心海禪人諸佛難窮淺與深古今錯喚是滄溟無形無相無名字列祖傳持只此心示尼月海禪人蟾蜍飛浴渤澥中乾坤一箇水晶宮直教光境俱忘卻親到末山見始終贈嘉禾雲衢趙居士浩浩彌陀不斷聲令人聞徹耳根清跏趺坐落松間月祖意明明一道行秋熱偶拈寄嘉禾斌政吳居士西林南畝正生禾已過伏天熱更多執扇烹茶消睡悶炎烝應待雨滂沱祝在北楊居士八秩玅心常住脫根塵鶴筭年花豈足臻唯此一機超那畔頭頭顯露劫前春示開之甯居士無位真人面目全見聞知覺照虛然若能解唱龐家曲箇事明明蓋代傳示鳳鳴安居士拶破機先那一關是非情盡不為難瞿曇四十九年囑阿彌陀佛坐舌端示慧明安居士無喜無嗔面目足秖緣善性根深固翹勤披奉鬱多羅日日行持自愛護示元法劉居士寒月夜深兩不雙光吞宇宙印千江古今無箇解稱賞整歲長然上矮窗示篤揚楊居士俯仰周旋皆祖意笑譚怒罵理非常須然應用無多子也要當人自發揚示尼月音禪人即心即佛難描畫非佛非心聖不傳了取平常心是道饑時喫飯困來眠示尼慈慧禪人玅心純粹絕修為日用頭頭自主持活脫一機無限意咄哉好繼末山尼贈南召迎恩慧聞都監迎恩何處不名聞獅子林中無獸群天地絕言能善慧上人素志可同雲贈慧明監寺參禪課佛要精勤便是出塵離苦津一念純真萬慮息頓超直下見當人贈慧光副寺單刀直入莫因循斬卻目前機境垠坐致太平無箇事任君在處擬相親示心銘副寺秋風秋雨起雲堆獨坐寒窗心似灰祖席寥寥為誰囑望渠日作棟梁材示密印知客頭頭融會本通達放去收來在汝邊此際期渠成法器嘉聲傳遞百千年贈自修禪德絕學本來超對待無為何用更商量自能坐斷聲前路高揭輝騰腦後光贈雙泉李居士是偈纔拈分萬象不同摩竭掩重門無生自證無生理正眼豁開見本根示睿宗法徒能所淨盡空廓曠揭開自己光明藏膺中瓊睿活神機超佛越祖大力量示覺宗法徒豈比尋常世俗情師資緣會信非輕遵依佛祖毘尼戒覺樹華開道果成示淨意知客一毫端上識根源靈鷲拈華今古尊迦葉破顏失正眼兒孫喚作破沙盆示空印侍者西來中毒不參禪苦侍巾瓶已有年信腳蹋翻華藏海寥寥坐斷言思讂示玄機書記歷代傳持只此心洞然無古亦無今拈華微笑靈山記烈燄分芳繼祖燈示懋蕃侍者靈山拈華露消息百萬人天明不得一笑開顏精識精嘉聲重振白眉力示越宗禪人弘機深密難窺測只在尋常日用中見色聞聲仍舊去自然越格亦超宗示義宗監院參禪該古亦該今密密窮之似海深體露十虛圜滿色奇華秀麗豔春林示耀宗禪人東風拂拂乾坤橐處處園林華亂萼樓子情忘一曲中靈雲疑破逞家擴示成然禪人春雲片片自飛高舉目遙看徹碧霄千古清風彌浩浩天然竭世虛閒包示空微禪人參禪求勝不相應勝乃修羅魔子心聲色叢中如薦得獨超物外箇知音示心宗副寺即心即佛絕纖埃卓爾無依擘不開惟此一機自受用閒忙動靜獨徘徊示卓宗營辦坐斷自家真淨土釋迦老子亦非佛南無稽首麻三斤缺齒老鬍不是祖不是祖半夜日輪正卓午示玄庵禪人知身是幻若浮漚世諦從教直下休以戒攝心期早悟寰中獨步更無儔示佛隱侍者六根不動絕前塵彼我無差本自真豈用安名與立號十方世界法王身示彥宗禪人不欺之力用非常一句南無百念忘動靜閒忙端的旨阿彌陀佛放毫光示尼乘蓮禪人塵勞頓脫入空門皤髮剃除出世尊坐臥經行時念佛雙親罔極盡酬恩示清奇禪人波波終日為誰忙識得忙底道益昌始信當人一段事心期遠大貴怕長侍陳琳侍者報云扇破索犀牛潦倒鹽官非善謀言下當機吞佛祖越山吳水不空遊不空遊牙爪深藏輕不露通身隱遯一峰頭示古龍禪人疊玅重玄豈易窮只須晝夜痛施功一朝覷見本來面能繼法泰道脈隆示慈容禪人西來消息與誰通旛動竿頭不是風能所量忘知見泯扶桑夜半日輪紅示恒照侍者自心是佛少承當剎剎塵塵放寶光見得分明真古佛寒來向火熱乘涼示道妍侍者卻將消息與渠通擊碎玄關那一重直截更無些蓋覆同中有異異中同示淳朴禪人今日親承古佛衣箇中須薦祖師機沒絃琴上宮商別不在陽春和者稀示慧融禪人誰謂拈華是別傳西來敢道總非禪吾宗直指無知解楊柳絲絲盡帶煙示月光禪人饑食渴飯困來眠日用頭頭自顯然半夜陽烏出海閜也非佛法也非禪示淨慧禪人本然清淨慧弘明植竹薅雲了幻情好箇為人消息子朝朝林下樂生平示道勤禪人念到心空佛亦忘更無餘事可思量東風陣陣催花柳紅日暉暉照竹房示謐愷侍者禪須必參道須學不是現成非造作儻順語言解未忘胸中何得超群略直下衝開萬仞崖頭頭拶入毘盧閣始知物物全彰頭頭獨脫法法不融而自融事事不擴而自擴汝今無求我無語列祖傳來此心箇此心箇南山起雲雨北山瞥向人前恣卓犖示法平禪人馬廄牛欄正覺場更於何處覓西方潦倒誑人剛指注明明好肉上剜瘡示法幢禪人原夢度茶無指趣一聲啼鳥入雲端仰山別有超群處不被溈山苦熱謾示玉明黃佛子善法堂前一片地莫教荒卻變桑田耕翻便把靈苗種子實香飄播在先示美之王佛子善人行善終身美有問誰為樂善旨一念平懷自坦然菩提解脫心無比示克生劉佛子時中一句彌陀佛當下能消歷劫愆念到心空佛亦寂何如浮世獨渠賢示余佛子兩目昏華光不夜耳根圜聽髮鬅鬠腳跟點地步真實也與從前較不增雜著齋榜襄州百丈山黃龍禪寺閎恢佛祖門庭具備叢林禮樂管取聖凡同聚出乎爾返乎爾宗風遍布於諸方從教福慧雙修行亦禪坐亦禪功果頓超於十地晨朝摶香積齋日午打龍宮供大開門戶誰管船來陸來高豎法幢任他風動旛動俾衲子悟禪悅法喜之機祈施主衍富壽康寧之福廣慧心而酬信施興國祚以祝皇圖戒殺放生念佛文靈蠢萬殊所感之身有貴有賤有富有貧福業雜糅捨此趣彼曠劫迨今歷試諸難正如轆轤圜旋不息流轉六道三途繇是觀之莫不由疇昔自作也凡人生天地間孰不承父母遺體然曰身體髮膚受之父母至於蜎飛蠕動異類含生咸稟陰陽氣以生成且世間人則曰天生以養人遂充其口腹於是燔炙烹炰以為快事殊不知世間至重者生命最慘者殺傷螻蟻蟣虱尚爾避死貪生此等之卑皆因惡業所弊受此微劣之軀惜哉肆其吞噬之謀若此能推己畏死之心而及物安肯其吞噬如是之切邪眾生迷昧何乃罠于山罭于淵百計多方搜羅掩取使其魂飛膽落母子離散羽毛鱗甲均同佛性形異貌別痛癢相關或囚籠檻如居囹圄或逼刀砧快鋒剮𢦟一頤指百命俱傾諧舉脣群孳絕滅季世殘忍已甚𥏫殺蕃多倚我強欺彼弱啗他肉補己身友戚親朋同牽六趣夫妻子女共結輪迴冤親聚首黑白難分永劫流連作者自受此則理恐非宜其心安忍人必將思過去已作之因則現生定受已作之果所以由今以驗昔因往以知來由今以驗昔則知定業之不化因往以知來則知定果而莫逃作如是因受如是果因果分明昭乎耳目焉不矍然起懼未來生死冥然無涯乎惜哉俗習深滋距劫怪世歲節春秋以之祀祖母難誕辰饔飧以之燕賓晨暮飯脯葷腸自為恣飽不思三途惡報悠長果因明然不爽能令生生互相賊害冤對相仇如形影相似不可移易也殺生之禍莫此為甚不可不恐怖哉嗟乎數十年來乖氛續興兵兇臶更刀劍臨身迴避無地群寇之殛現見尸橫遍野白骨盈岡咸斯殺業釁為之致也繇是昦天垂矜先聖行睿釋網著於成湯天子埋骨興於文王聖人壽禪師慈風未泯贖鱗虫而得度蓮大師悲心由在鑿窪池被物蠢以全生孫真人遺寵猶存救龍子而傳方沙彌易短命為長年一活蟻也書生改卑名為上第一放龜也孔愉微職而封侯毛寶臨危而脫難酒匠拯已溺之蠅死形而復穌廚婢捨將烹之鱉痼疾而痊瘉俾居水族者游潛泳沫處林澤者跳躍飛翔獲驗全生之樂自得性中之天放生之效事非無徵施皆有報昭然如此普願仁人隨所見物恤念生靈物我一體發慈悲心共相勸勉開解脫門好生植福捐己之財行方便事予具言至此諒同志者目擊於心或恩周多命而莫積陰功多福聚於今生若惠及一蟲而利益寧尟餘慶逮于他世苟能慈心接物更加稱念佛名彌陀古佛當體輝彰唯斯念佛法門超脫業障苦海均資九有拔利四生當知揭顯戒殺放生念佛功德最勝者也請各直下承當回蜀省親傳前佛應化不誕虛空然有父母宗屬生氏令人歷傳可考蓋吾人之有親猶水之有源木之有根所從來者也吾宗之著止周宣王之代支分派別散之六合抑從來亦遼矣又何知焉所審高祖曾祖居蜀成都資縣吾祖所生惟先君先君生二人余其次也而先君治生最專慎教兒極嚴謹余七歲始入館至十齡時遇佘酋叛亂一日父諭之曰殺戮之刑何以相遠予即求出塵先君吾母即命出家及攝衣從師剃落未逮一載先君以吾母囑長兄事之亦從佛薙髮如是空門者踰十二年哀哀先君不幸先朝癸酉以疾而終先君生于萬曆二十一年癸巳十月初五日歿於崇禎六年三月十二日也余選日茶毘建塔於富順縣瓦宅舖九龍寺之南山舊額五龍廟明季時鄉紳諱麟號瀛仙周老先生改為九能寺守塔一載參學心切奮志南詢自離故鄉三十有五祀未始不欲南還塔隴修法為父之冥贊會其世之亂猶未果念嗚呼余何能述先君聊記大概用以想見其音容耳吾母成我之道未酬自於懷之育之不計其劬勞之恩吾母事先君以先君不治家捐愛出塵吾長兄年幼吾母持家拮据勞苦余兒童出家又何知哉自今思之先君吾母之德實同天無際海無涯雖釋子割愛而形生大本孰可忘之吾母雖則有兄奉養而不能躬行定省之事執兼且道力弗充莫克致父母宗親於安養之上品仰觀大覺世尊成道之初說法於靈鷲山中父皇成道於當時又說法於忉利天宮聖母直下證無生忍聖人可謂與人道大合也慕諸勝軌目犍連運神力破嶽府之深扃拔母罪而直出泥犁黃蘗隔江投火母獲生天感聞其謝子之聲於雲旆之端倪睦州師編蒲呼母母亦悟道恭行以籃輿負母至於竟老六祖始鬻薪以養其母將登黃梅從師患無以為母贍殆欲為傭以取資及得法南還而其母已歾慨不得以道見之東震法幢賴獦獠漢健身揚名至今存焉遂寺其家以善之終亦歸于此也故葉落歸根能祖道人也詎測量其異德猶示人而遺其本也然而諸名德不忘其親於聖人之意得之矣且二十餘年鄉邑嬰於大亂未知吾母若存若歿先父塔廬得不為其剽難猝暴乎瞻之望之漣然泣下今年會事益有所感是可以省吾親安吾親遂旋里之舉故著是說發明吾佛列祖大孝之密意奧理耳時大清康熙六年丁未仲秋十二日歸覲生事死祭孝斯在矣挂鐘板師呈板云鉗錘佛祖號令人天今日懸堂前通身無向背於此薦得金鐘恆說無生法玉板常鳴劫外音遂擊板云若將耳聽終難會眼處聞聲方始親挂火板觀音入理門衲子莫蹉跎擊板云分明舉似絕淆訛逐色尋聲已錯過開梆形聲未先曠默以何準簨橫崇臺善存而殊應舉椎云椎下無私聲前不讓隨擊梆云直下洪音施正令衲僧莫不共徜徉安監齋手中鉞斧護身符凜凜威風見也無化供察齋忙不徹叢林擁衛助香廚佛事為天童密雲悟老和尚忌日設供拈香指幀云堂堂覿面覿面堂堂於一毛端智遍法界為甚麼古德道覿面相逢堂堂不見舉坐具召眾云還知西來落處麼昔曾親喫棒至今痛不已然雖如是一段苦屈不得不說破良久以香爇爐云天童佛法無多面目分明見麼遂率眾展拜香嚴宕山遠師翁訃音至挂幀云先師翁慈容窺覷有繇遽聞遷化吁嗟涕淋法門不幸痛傷莫量翁昔繼濟宗銘今示真歸告且喜自始至末從初到終一期事畢真善知識西來忝為法孫誠謂青出於藍今日不免設一分供點一盃茶爇一瓣香熏禰鼻孔召眾云還見香嚴老古錐麼復指幀云虔修薄供惟翁鑒三片旃檀三度熏遂燒香上供展拜香嚴遠師翁週忌拈香云親翁三番覿面難睹離翁一載難睹覿面今朝狹路相逢難為迴避誠欲撮土為香不免傍觀者哂舉起香云大眾若道是香也觸了非香也背了畢竟如何咦便燒暮春宕師翁諱日拈香云昔年今日生幸值春深山色織昔年今日滅雨泣山花紅似火生滅去來卓然超絕時節分明面目現成良久云常憶江南三月裏鷓鴣啼處百華香丁未秋回川為先君在天定公掃塔云河山閱歷數千里無縫塔前覓父容誰曉先君真面目兒孫顯露日用中遂插香上供作禮為佛會菴懸鐘洪爐鞴內越翻身偉器成來世所珍鳴鐘三下云音震乾坤惠號令喚回多少夢迷人黃龍奇然智先老和尚訃音至挂幀舉哀云百丈峰前古法幢全提唱道久非常抽身鬧裏獨歸去海涸山崩五內傷雖然如是正似昔年大庾嶺頭笑卻成哭今日西來門下哭卻成笑何也豈不聞古宿有云喫泉水貴地脈且要正眼流通宗風不墜可謂於時法幢摧而未摧法梁折而未折法河乾而未乾法眼滅而未滅諸人若能如是會奚用哭蒼天祇如通信一句又如何道祖月凌空圜勝智何山松柏不青青遂拈香作禮九拜先老和尚一周上供指幀云此是黃龍堂上先師奇老和尚一生孤硬不近人情底面目不肖明林昔遭鈍置今日故無三轉語諸人薦麼設或躊躇再為注腳舉僧問巴陵鑑禪師云如何是提婆宗陵云銀碗裏盛雪如何是吹毛劍云珊瑚枝枝撐著月祖意教意是同是別云雞寒上樹鴨寒下水後雲門聞云老僧百年後只將此三轉語供養老僧足矣遂驀顧左石云即今素拙兒一語也無且作麼生報答作女人拜乃上香上供作禮先老和尚諱日上供拈香云東君行正令及節遍閻浮梅闢花燦爛馨香子實稠者是老漢鼻孔分明覿面昂藏即今還有知老凍濃本命元辰底麼良久云兒孫已普傳天下壽量無窮不計秋遂插香率眾禮拜先老和尚三周對塔上供百丈山頭擒虎兕漢江波上釣鯨鼇口吞佛祖絕同類眼蓋乾坤獨據高前年二月初三那伽定今歲三周慧辨豪驀豎拂子召眾云看看先師從定而起在拂子上放紫金光說微妙法頓令人天親獲記莂還見麼還聞麼於此見得聞得慧日高懸法雲彌布箇裏玄要掀翻主賓不立淨裸裸無內外孤卓卓亙古今所以徹骨徹髓血脈貫通透頂透底乾坤獨露綿綿不漏器器相傳不肖秀上座親為諸仁點出作將來眼拈起香云有來由無巴壁沒興相逢黃龍寺拾得底無頭無尾無眼耳鼻舌身意復舉起香云若是一片旃檀香嗅著全無香氣今日外揚家醜明人不作暗事便燒為一真大師起龕有佛處不肯住覺華拂拂面門開無佛處徑走過踏碎雲山俱腳底自不夜行天明已到遂拽杖引之入塔拓起骨云盡十方世界是箇金剛正體是箇無縫塔門到者裏出亦無礙入亦無礙遂進骨云無縫塔中開正眼普門千古鎮常存安陸太音庵法孫普德普續請為印文師祖起龕心地坦然性光皎潔又安得有去來徑之可分有生死相之可別然則如此理絕千差事無一向且道起龕一句又作麼生這條鼻直通霄路輕然移步往西方下火師至龕前把炬云平生機用今朝盡辭世茶毗正此時劫火洞然凜凜發通身觸著光煒熙攛火炬云欲問印公安樂土西方端坐寶蓮池入塔火滅煙消會見稀無生面目沒倚依頓辭人世隱形外脫體巍然對落暉恭惟老耆宿印公覺靈七十六年前始於郢地生生而無生相七十六年後終於郢城去去而無去跡正所謂無始來生死交謝而靡移亙古今寒暑迭遷而不易今既非去昔亦豈來迥超三際獨脫今時所以住閻浮七十六年實性孤高胸懷安靜現前兒孫蟄蟄法眷繩繩續焰聯綿分枝列派今日化緣已畢頓歸安養祇如應時應節作麼生是退藏於密遂下襯云烈焰堆中煆過無縫塔裏安身香嚴師翁塔前上供拈香云燈傳臨濟不容擬議掀翻窠臼直截為人六坐道場慣用圜機且道黃龍法孫明林今日到這裏向甚處相見師翁聻遂作相云一塔巍然千古秀日月長明不夜燈禮拜退安陸北關外白衣庵穎石轉石崑石衡石禪德請悼先師潤慈德公上座對靈云點點荷錢池畔綠枝枝榴火檻邊紅當陽薦得真消息直往西方剎土中恭惟潤公覺靈棄常郡旺族入瞿曇氏門出處非凡安身得地始於太音教院肆志法義然後住持北關外白衣庵三十餘載使殿閣鼎新山門壯觀佛像嚴飾器具周全可謂光前耀後正好應緣行化何期彼岸先登復祭云嗚呼公之為人兮識見高明公之處世兮胸懷特達公之齒德兮尊乎高上公之戒珠兮淨爾無塵公之法眷兮派衍賡後真一世之偉仁兮後昆之良範詎料忽唱滅兮令人淚出痛腸嗚呼岸柳依依兮亭花簇簇即境明心兮了無回互吾今告公真言兮確實還鄉這邊那邊兮形諱聲揚勒文致祭兮介師盛德香茗薄奠兮揭徒寸心生死幻化兮寂滅為樂靈其不昧兮倏爾來歆起龕公滅亦速合徹玄微體絕依倚徐行獨步然雖如是且起龕一句作麼生道程途俱不歷頃刻到西方以杖擊龕引之而行入塔無來無去千古音容常在不生不滅本來面目恆存下龕云坐斷涅槃城端踞無縫塔代代子孫賢栴檀樹無雜為古蘭和尚塔前設供佛祖出世應緣行化度生事畢返本還源法兄古蘭和尚生緣西川與吾同門道眼洞明靈機廓徹前年繼先師法席正欲高踞猊座播揚宗教豈謂化緣已竟辭眾說偈而逝今日法弟紹席別無所敬香焚三炷茗斟一甌略伸道義格鑒微情遂插香拜悼南召迎恩映昧和尚轉無上法輪於鹿鳴為人曾不憚敷揚如日當午罄無側影提毘盧正印於迎恩揭翻佛祖開玄路如風吹水自然成紋鎔凡鍛聖只在剎那出死超生如同游戲大眾還知喜法弟用處麼縱橫手面與人別榜樣堪留後世看法徒尚景尚溥為故恩師淨極故伯立宗二公三周誦經禮懺上供請悼二公萬事已都忘兩曜昇沉一任忙落落襟懷絕塵慮了無心念往西方唯法子淨極澂公者戒撿冰清不惜身命為法重故攻苦清淡刺血書經而能明佛心宗備行法門中事以法徒立宗道公者與淨公一日薙髮同期具圜二公行解兼全豈非有行乎然廿餘載之間晝夜奔馳出入孜孜不懈使西來法幢煥然一新山門壯麗真一世英傑後學良範正宜執持院事何期一旦傾逝嗚呼人之生兮聚首同住人之死兮各行異路嘆萬法無常嗟色身匪固臨行說偈相辭撒手翩翩獨步俄驚三周之期設供誦經薦度悟自性彌陀達惟心淨土溪聲舌相處處全彰山色身形頭頭顯露祭薄奠之珍饈想二公之來赴為後堂太初敏禪德起龕日暖風和爽氣新密移一步正斯辰而今撒手歸何處直往西方罷問程下火我心傷痛太初公誠實胸懷無有二毘尼嚴淨若珠珍出處為人而得地上座生緣蜀夔高梁古氏之子幼年薙髮靈機敏達慧性開通然後晚景出蜀慨爾西來圜具十二年間處身不憚勤勞輔弼山野意氣高賢檀那敬德衲子稱名正好佐助叢林何期一旦傾逝浮生七十三世緣今已謝到這裏須信道涅槃無二路方便有多門越過生死關絲毫無間隔乃舉火炬云敏後堂會不會當機宜悟真消息便是逍遙物外人攛火炬云欲識到家安穩處紅爐焰上露全身為靜虛禪德設供雪消庭畔凍𨴍河大地陽回暖氣多欲識真靈歸去處一輪明月蘸清波恭惟圜寂靜虛海公覺靈性質孤高胸懷坦蕩足下幸得薙髮上首智覃公者現紹臨濟正宗分枝列派可謂法眷繩繩兒孫蟄蟄禪德既住人世已滿且喜玅契無生所以吾佛道諸行無常是生滅法生滅滅已寂滅為樂若也恁麼薦得本來面目分明在春水春山顯舊形今日仙茗一甌香一片聊伸道義眷微情起龕雲深二月聚西峰可惜光陰日不同試看山前桃李樹此時猶自醉東風驀拈拄杖指龕云且道者上座向何方所蟭螟穩跨崑崙背撞倒須彌壓碎空下火七十七年間一心渾落魄課佛持戒堅示疾而告寂證得金剛不壞身便歸如來大圜覺攛火炬云紅爐焰焰雪花飛一點靈光遍寥廓為立宗知客起龕出生出死得大自在且如何是出生出死得大自在一著子良久以杖引云擺手毘盧頂上行便是當人好消息下火未悟客塵煩惱熾盛既明一真廓然清淨豎火炬云須看死柴頭活燄揚真令直教皮袋從此盡留得莖毛翠拂天為元宗禪人起龕應知諸法如幻生死猶若雷電來去自住圜通直往西方無間下火五十三年前生生幻五十三年後死死幻生死根株今已坐斷皮囊付與丙丁童灼灼光明輝八面為福宗緣知殿起龕且喜達惟心彌陀遠降迎接引歸佛國臺畔禮慈尊下火陣陣朔風送福宗信是超然樂無窮直須火裏翻身去獨步毘盧頂上頭為佛隱貴侍者起龕以杖擊龕云佛隱山河體性空休分南北與西東今朝躍出生死路萬派千峰總一同下火拈炬豎起云不變金剛體明明在目前隨緣須透脫獨露莫貪觀此去再來吞佛祖巾瓶左右得逢原且道末後全提句又作麼生攛火炬云來去杳杳絕形跡烈燄爐中片雪寒入塔學無前後達者為先生居人世一十九年西來出家圜具參禪志念真堅吞栗棘蓬透金剛圈臨終念佛擦手安然拓襯入塔云孤峰頂上埋金骨淨土花開一朵蓮壽塔丁巳季春廿四日為師造壽塔功畢集眾上塔頂請示眾師至塔前云春風浩浩林木長新無縫浮圖巍然卓立拈拄杖指塔云大眾此是現住西來傳臨濟正宗第三十四代秀野明林末後全身竁窆之所今日不顧面皮厚不識羞恥親拈自弄自揚家醜與諸公重下注腳良久云茲者廣濟澂源主人荊南罕拙上座及我嗣法門人合山諸公列剎高德眾居士等不忘靈山之囑直指湘南潭北大家信手拈來頓成一座寶塔可謂超出古人一頭地矣莫言忠國留此樣祇是古今浪相傳所以截斷大庾支離覷破疏山漏逗故知鷲嶺當年事今日分明不用猜無縫層層於一致當陽卓立泯功該斯事且置祇如理圜事畢轉功就位一句作麼生道金針雙鎖全心印永鎮陂湖億萬年行繇順治庚子冬兩序暨合山眾職事等各各懷香人方丈啟述行腳師曰有何行腳可說若說行腳家醜外揚你等是無事生事專露山僧醜拙也眾懇乞不已師曰然說便說了汝等不得記取一字予西蜀成都資縣人也父姓周諱朝富母饒氏世族錦衣於萬曆四十二年甲寅七月初九日辰時生始離襁褓辛酉佘酋叛亂予雖兒童知敬佛乘一日父諭之云天下無平均故有攻戰之亂殺戮之刑由此生死驚懼何以相遠予聆父訓銘刻於心爾時求出家父母聽許即命之富順縣九龍寺禮星天師為徒越明年母長兄事之父隨出家予蒙父師教誨十有二年崇禎六年癸酉春父師前後遷化予自計曰昨日的今朝不見了早晨的晚些不見了整日應酬人事有何利益即趨傅家庵印心老宿處印問曰聞汝父師俱喪是否予涕泣曰是印曰生死事大無常迅速曰弟子身墮三寶數心未出家丐師一言指箇出生死路印曰汝曾讀法華經麼曰讀過曰經中道佛子住此地則是佛受用汝作麼生會曰經行及坐臥常在於其中印曰此語且非汝本懷汝試父母未生前道一句看予被一問茫然無曉印曰山僧萬曆年間在兩浙參見尊宿蒙他指箇歇處不似爾等未出境而清機密旨擬欲覯邪曰再乞開示即遍參去印曰汝但持佛子住此地則是佛受用句偈只是持時不得將心領略分別解會唯貴猛著精彩直下持去他日自有尊宿與你點破予禮曰謝師激勵終身不敢忘卻每日參究怏怏然似物塞膺一日忽值一禪客到寺挂搭譚及天童密雲老和尚玄墓漢月和尚孤峻門庭實深相為機鋒敏捷鮮敢當者予曰既鮮敢當者禪師曾參見否時禪客舉拳云喚作拳則觸不喚作拳則背你喚作甚麼予罔措被訶曰何不遍歷諸方去予年二十隨吼石親教師南遊癸酉冬發足甲戌春抵南京吼師單丁參玄墓予寓金陵講席四載戊寅春腰包下姑蘇謁玄墓漢老和尚尚一見便問是何省人曰四川漢舉竹篦云喚作竹篦則觸不喚作竹篦則背汝喚作甚麼予挺身而立漢曰西川蠻子亂做予禮拜起漢理前語問之予珍重出詣知客寮詢吼師下落忽一師從禪堂出說吼石兄在此住兩載去年秋往杭州西天目山住靜予得信即過浙到徑山參雪嶠師太一見禮拜了便問十方世界中一切人師子阿那箇是師子頭雪曰設有你向甚處見他曰放過一著雪便打曰草草打著箇拂袖便出登天目山禮高峰中峰斷崖三祖塔畢到吼師靜室吼曰汝三年離我歷諸方見老宿所得的一一通來看予叉雪便打曰這漢從來沒縫罅吼曰汝別我三年實無得處予曰疑則別問即服勤三箇月一日吼舉竹篦云觸不得背不得汝喚作甚麼予不能答被痛打一頓予參究兩晝夜目不交睫至第三日吼驀搊住云速道速道予被一拶通身汗流即口占一偈毫端開豁好精神落落舉揚處最親氣宇堂堂無向背等閒放出百千真吼曰汝將謂大事了明未在更親切道一句看予又曰剎剎塵塵超背觸由來行履不虛躅交羅溢目心眼飛玅相圜明元具足時品中靜主在傍豎拳云贓在者裏賊在甚麼處被予劈面掌云贓賊俱獲捉敗了也吼休去予雖有箇入處尚懷猶豫未得脫落是秋辭吼師參天童悟祖至人事了問除卻棒喝語言和尚將何指示學人童便打一掌予曰學人自招得童曰汝道自招得招得箇甚麼予便禮拜童腳與一蹋予不覺通身汗流更得一番慶快次年己卯四月八圜具秋到金粟參費隱老和尚問如何是覿面相呈一著費便打予一喝費復打予曰瞎棒瞎棒費連打數棒云瞎棒元來有人喫在予曰奈遇某甲檐荷得舞坐具出冬結制貼悅眾單時玄密智光二師作維那柴立師為連單一日隨眾入室侍立次費拈拂子云老僧這柄拂子與人祇有一問問諸人諸人若答得便分付古德道舉一不得舉二放過一著落在第二且一如何舉時孤煙師下語云六六三十六費詬罵一頓復云還有道得底麼出眾道看予出伸禮了依位而立費顧云汝道也太煞道祇道得一半予曰一半與和尚道費拈棒予珍重出辛巳秋予仍參天童遇彌勒佛像成眾請開光童至座前以拄杖指云大眾者老漢已開平等眼光普視諸人了也諸人還識普視的意麼若識得便知古人道彌勒真彌勒化身千百億時時示時人時人自不識若不識老僧為諸人一時點出遂以拄杖打散予被一頓痛棒全身放下剔脫猶豫遂呈一偈荷師頓棒太多焉打破從來一肚禪卻見自家真面目渾然更不別求玄童接入袖復伸手云將偈來與你看證予曰謝和尚證偈竟作禮出壬午春解制予出山回川養親至荊州地方行李罄失到巴東荊南大亂予避進建始縣永安寺刺血寫法華梵網二經經畢起身上川遇張寇入川大亂止施州衛冬瓜溪荷桂亭陳居士刱菴留予住靜六載己丑春復下江南過遠安聞奇然本師於南漳雲臺山住靜直造謁之蒙留過夏予將昔日所做工夫天童金粟機緣一一陳白師曰何不再參諸方去予豎一指師曰弄虛頭作麼予將茶一潑師便休一日師以偈示之天童角虎到湖東得意忘言步步通任他十方塗毒客都來盡喪爪牙中予和曰含虛包括絕西東向上玄微豁徹通縱有大方英俊衲到來盡伏爪牙中師覽畢曰有半根拄杖子分予云是何言歟是年冬忽聞破山老和尚出川詣天童埽塔予有參侍之念辭師到安陸訪信破未曾離川予遂遊東山華嚴古硐靜安上座留住癸巳四月八日請為眾弘戒予堅辭不已應之遂六處放戒甲午住普門結冬制延抱一講主弘楞嚴經百日禪期丁酉歲聞本師住襄州黃龍予六月二十九往禮師出迎之曰這幾年聞公在安陸荊州大興佛事予默然而退接進師遂撾鼓上堂集眾云百丈山前親行此令本來無說除人之病卓杖云一擊塗毒鼓玄沙遇猛虎橫吞海底月吸盡賓與主握偈拂與之云大唐國裏無人奇然可知之也兩手拿盡虛空分付秀野禪者予接云當人突出腦後眼睛腦後眼睛今瞎了依前祇是舊時人請師不接師震威一喝予曰大眾證明便禮拜予不意因緣至此乃卓錫焉上來是予二十餘年奔南走北請益尊宿不唧溜事漏逗不堪今因諸公勤求不已出盡百醜諸公們慎勿效繇各各直下承當有甚麼隔礙時寒久立珍重眾作禮踴躍而退法子最澂戒子如心最清寂聖最見照慧性弘玄庵實信實恪實性照元實照修成海洪性恩法徒實道法孫尚能實和尚瑩德極尚溥德會際昇實炯德洪實瓊實果同捐資敬刻秀野林和尚語錄卷一之三用廣流傳伏願人人透脫生死關薦取衣中無價寶者康熙二十三年歲次甲子中秋日謹識板藏禾郡楞嚴寺嘉興吳知先敬書張舒瞻繡梓
